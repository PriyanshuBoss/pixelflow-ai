AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Timeout: 900 # 15 minutes to exit lambda

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues:
      - staging
      - production
      - experiments

  AzureOpenAIKey:
    Type: String
    NoEcho: true

  FalKey:
    Type: String
    NoEcho: true


  NewrelicAccountID:
    Type: String
    NoEcho: true

  NewrelicLicenseKey:
    Type: String
    NoEcho: true

  FunctionName:
    Type: String
    Default: image-generation

  LogLevel:
    Type: String
    Default: INFO

  AwsGcpRole:
    Type: String
    Default: arn:aws:iam::506569801059:role/aws-lambda-gcp
    NoEcho: true

  PromptInputQueueUrl:
    Type: String
    Default: INFO

  PromptOutputQueueUrl:
    Type: String
    Default: INFO

  BucketName:
    Type: String
    Default: INFO

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API Key for image generation

  AzureOpenAIKey:
    Type: String
    NoEcho: true

Resources:
  IdeasNanoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${FunctionName}-${Environment}"
      Handler: newrelic_lambda_wrapper.handler
      Runtime: python3.11
      CodeUri: .
      MemorySize: 1024
      Role: !Ref AwsGcpRole
      Environment:
        Variables:
          NEW_RELIC_ACCOUNT_ID: !Ref NewrelicAccountID
          NEW_RELIC_LICENSE_KEY: !Ref NewrelicLicenseKey
          NEW_RELIC_EXTENSION_SEND_FUNCTION_LOGS: true
          NEW_RELIC_EXTENSION_LOG_LEVEL: !Ref LogLevel
          NEW_RELIC_APP_NAME: !Sub "${FunctionName}-${Environment}"
          NEW_RELIC_TRUSTED_ACCOUNT_KEY: !Ref NewrelicAccountID
          NEW_RELIC_LAMBDA_HANDLER: serverless.lambda_handler

          PROMPT_INPUT_QUEUE_URL: !Ref PromptInputQueueUrl
          PROMPT_OUTPUT_QUEUE_URL: !Ref PromptOutputQueueUrl
          BUCKET: !Ref BucketName
          AZURE_OPENAI_KEY: !Ref AzureOpenAIKey
          GEMINI_API_KEY: !Ref GeminiApiKey
          FAL_KEY: !Ref FalKey

      Events:
        InputQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt IdeasNanoQueue.Arn
      Layers:
        - arn:aws:lambda:us-east-1:451483290750:layer:NewRelicPython311:50

  IdeasNanoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "push-generate-image-generation-${Environment}"
      VisibilityTimeout: 910
